services:
  mysql:
    image: mysql:8.4
    container_name: smartklass-mysql
    restart: unless-stopped
    ports:
      - '3306:3306'
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-smartklass_root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-smartklass}
      MYSQL_USER: ${MYSQL_USER:-smartklass}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-smartklass}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  mysql_data:
