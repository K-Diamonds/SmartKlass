name: Redeploy Vercel

on:
  workflow_dispatch:
    inputs:
      target:
        description: What to deploy
        required: true
        default: both
        type: choice
        options:
          - both
          - api
          - web

jobs:
  deploy-api:
    if: inputs.target == 'both' || inputs.target == 'api'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Deploy SmartKlass API to Vercel production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          npm i -g vercel@latest
          vercel deploy --prod --yes --no-wait --token "$VERCEL_TOKEN"

  deploy-web:
    if: inputs.target == 'both' || inputs.target == 'web'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_WEB_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Deploy SmartKlass Web to Vercel production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          npm i -g vercel@latest
          vercel deploy --prod --yes --no-wait --token "$VERCEL_TOKEN"
